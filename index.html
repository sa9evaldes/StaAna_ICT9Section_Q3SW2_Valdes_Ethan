        }

#grades{
        width: 860px;
        background-color: #014029; 
        height: 200px;
        padding: 20px;
        border-radius: 15px;
      }


            h3 {
        color: #005249; 
        text-decoration: none;
         text-shadow:
    -1px -1px 0 #fff,
     1px -1px 0 #fff,
    -1px  1px 0 #fff,
     1px  1px 0 #fff;

        }
     /* navigation bar elements */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #014029;
            position: relative;
            z-index: 10;
            width: 100%;
            border-radius: 15px;
        }

            a:link, a:visited, a:hover, a:active {
        color: #005249; 
        text-decoration: none;
         text-shadow:
    -1px -1px 0 #fff,
     1px -1px 0 #fff,
    -1px  1px 0 #fff,
     1px  1px 0 #fff;
        }


            h1 {
        color: #005249; 
        text-decoration: none;
         text-shadow:
    -1px -1px 0 #fff,
     1px -1px 0 #fff,
    -1px  1px 0 #fff,
     1px  1px 0 #fff;
        }
        
        #buttons, #grade_btn{
        color: white;
        background-color: #014029;
        border: 3px solid gray;
        border-radius: 20px;

        cursor: pointer;
      }
        
       #grade_btn{
        font-size: 15px;
        background-image: linear-gradient(to right, black, #014029);

        #budget{
        text-align: center;
        font-size: 25px;
        color: #014029;
      } 
       

        /* hero  background */
        .hero {
            min-height: calc(100vh - 130px); 
            display: flex;
            justify-content: center;

            position: relative;
            z-index: 1;
            padding: 20px;
        }

    

      #HOBBY ALLEY, #TOYTOWN{
          height: 100px;
          width: 300px;
      }

            display: flex;
            gap: 10px;
         text-align: center;
        }

        .row div {
            flex: 1;
        }

     


        /* footer styling */

          }

</head>

<body>

<!-- NAVIGATION BAR -->
<nav class="navbar navbar-expand-md">
  <div class="container-fluid">

    <!-- Left side links -->
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" href="#">SHOP</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">LOCATE</a>
      </li>
    </ul>

    <!-- Center Title -->
    <center>
      <h1>THE GUNPLA RADAR!</h1>
    </center>

    <!-- Search Bar -->
    <form class="d-flex">
      <input class="form-control me-2" type="text" placeholder="Search">
      <button class="btn btn-primary" type="button">Search</button>
    </form>

  </div>
</nav>

<br>

<!-- BUDGET SECTION -->
<center>
<div id="grades">

  <form>
    <h3>
      Looking for some new Gunpla?
      
      <br>
      Enter your budget and let's find the right grade for you!
    </h3> 

    <!-- User types budget here -->
    <input type="text" class="form-control" id="budget" placeholder="Enter here...">
  </form>

</div>
</center>

<br>

<!-- BUTTON SECTION -->
<div class="container">
  <div class="row">

    <!-- grade & Discount Button -->
    <div>
      <button id="buttons" class="btn" onclick="showgrade()">
        Grades & Discounts
      </button>

      <!-- Output will appear here -->
      <div id="grade"></div>
    </div>

    <!-- Store Location Button -->
    <div>
      <button id="buttons" class="btn" onclick="showStore()">
        Store Location
      </button>

      <!-- Store info will appear here -->
      <div id="stores"></div>
    </div>

  </div>
</div>

<!-- JAVASCRIPT SECTION -->
<script>

  // Function runs when grade & Discounts button is clicked
  function showgrade(){

    // Get value from input field and convert to number
    let budget = Number(document.getElementById('budget').value);

    // Compute 20% discount
    let disc = budget * 0.20;

    // Format discount to 2 decimal places
    let finalPrice = disc.toFixed(2);

    // Display grades and discount inside "grade" div
    document.getElementById("grade").innerHTML =

      "<br><b style='color: white;'>Gunpla Grades:<br>" +

      "<button id='grade_btn' class='btn'>HG</button><br>" +

      "<button id='grade_btn' class='btn'>RG</button><br>" +

      "<button id='grade_btn' class='btn'>MG</button><br>" +

      "<button id='grade_btn' class='btn'>PG</button><br>" +

      "<br><br>You are eligible for: " +

      "<span style='color: red;'><kbd style='font-size: 25px;'>" +
      finalPrice +
      "</kbd></span> discount.</b>";
  }


  // Function runs when Store Location button is clicked
  function showStore(){

    // Insert store information inside "stores" div
    document.getElementById("stores").innerHTML =

      "<br><img id='HOBBY ALLEY' src='https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRo2H4yz_AYmFYqzyB3MR18BduS4hW0zwPBKg&s' class='img-thumbnail'><br>" +

      "<br><b style='color: white;'>Location:<br>" +

      "<i>Corner Roosevelt, 2ND FLOOR VIRKA Bldg 1191 EDSA, Fernando Poe Jr. Ave, Quezon City, 1105 Metro Manila</i><br>" +

      "<br><img id='TOYTOWN' src='https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTapaaHcuUviVD3WyXvizn1JmMcFyeScXcg_A&s' class='img-thumbnail'><br>" +

      "<br><b style='color: white;'>Location:<br>" +

      "<i>Glorietta 4, 3RD FLOOR 4 Palm Dr, Makati City, 1200 Metro Manila</i>";
  }

</script>

<br><br><br>
